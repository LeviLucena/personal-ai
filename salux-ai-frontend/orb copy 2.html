<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salux Orb — Protótipo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #03080F;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }
    #orb-container {
      width: min(620px, 92vmin);
      height: min(620px, 92vmin);
    }
    #label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120,180,255,0.30);
      font: 11px/1 system-ui, sans-serif;
      letter-spacing: 0.22em;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="orb-container"></div>
<div id="label">SALUX ORB — PROTÓTIPO</div>

<script type="module">
import { Mesh, Program, Renderer, Triangle, Vec3 } from 'https://esm.sh/ogl';

/* ── Vertex shader ─────────────────────────────────────── */
const vert = `
  precision highp float;
  attribute vec2 position;
  attribute vec2 uv;
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 0.0, 1.0);
  }
`;

/* ── Fragment shader ───────────────────────────────────── */
const frag = `
  precision highp float;

  uniform float iTime;
  uniform vec3  iResolution;
  uniform float hover;
  uniform float rot;
  uniform float hoverIntensity;
  varying vec2  vUv;

  #define PI  3.14159265358979
  #define PI2 6.28318530717959

  /* ── Hash / noise ── */
  float hash21(vec2 p) {
    p = fract(p * vec2(127.34, 311.7));
    p += dot(p, p + 48.23);
    return fract(p.x * p.y);
  }

  /* ── Helpers ── */
  float ring(float r, float target, float w) {
    return smoothstep(w, 0.0, abs(r - target));
  }

  /* Orbital dots — O(1), no loop */
  float orbitDot(vec2 uv, float radius, float count, float dotR, float speed) {
    float len     = length(uv);
    float radDist = abs(len - radius);
    float angle   = atan(uv.y, uv.x) - iTime * speed;
    float seg     = PI2 / count;
    float frac    = mod(angle, seg);
    float dA      = min(frac, seg - frac);
    float arcDist = max(len, 0.001) * dA;
    float d       = sqrt(radDist * radDist + arcDist * arcDist);
    return smoothstep(dotR, 0.0, d) * step(radDist, dotR * 5.0);
  }

  /* Sine wave */
  float sineWave(vec2 uv, float amp, float freq, float phase, float w) {
    float y    = amp * sin(uv.x * freq + phase + iTime * 1.6);
    float fade = smoothstep(1.3, 0.25, abs(uv.x));
    return smoothstep(w, 0.0, abs(uv.y - y)) * fade;
  }

  /* Gold dot pinned on the primary wave */
  float waveDot(vec2 uv, float px, float amp, float freq, float r) {
    float py = amp * sin(px * freq + iTime * 1.6);
    return smoothstep(r, 0.0, length(uv - vec2(px, py)));
  }

  /* Flower of Life — 7 overlapping circles (center + 6) */
  float flowerCircle(vec2 p, vec2 center, float radius, float w) {
    return smoothstep(w, 0.0, abs(length(p - center) - radius));
  }

  float flowerOfLife(vec2 uv, float rot_) {
    float r  = 0.092;   /* circle radius in UV space  */
    float w  = 0.0038;  /* line width                 */
    float c_ = cos(rot_), s_ = sin(rot_);
    vec2 p = vec2(c_ * uv.x - s_ * uv.y, s_ * uv.x + c_ * uv.y);

    float f = flowerCircle(p, vec2(0.0), r, w);
    for (int i = 0; i < 6; i++) {
      float a = float(i) * PI / 3.0;
      f += flowerCircle(p, vec2(cos(a), sin(a)) * r, r, w);
    }
    return clamp(f, 0.0, 1.0);
  }

  /* Outer seed ring (6 circles at sqrt(3)*r) */
  float outerSeed(vec2 uv, float rot_) {
    float r  = 0.092;
    float w  = 0.0028;
    float c_ = cos(-rot_ * 0.6), s_ = sin(-rot_ * 0.6);
    vec2 p = vec2(c_ * uv.x - s_ * uv.y, s_ * uv.x + c_ * uv.y);

    float f = 0.0;
    float dist = r * 1.732;
    for (int i = 0; i < 6; i++) {
      float a = float(i) * PI / 3.0 + PI / 6.0;
      f += flowerCircle(p, vec2(cos(a), sin(a)) * dist, r, w);
    }
    return clamp(f, 0.0, 1.0);
  }

  /* Sparkle / star field */
  float sparkle(vec2 uv) {
    vec2 g     = floor(uv * 38.0);
    vec2 local = fract(uv * 38.0) - 0.5;
    float h    = hash21(g);
    if (h > 0.12) return 0.0;
    float twinkle = 0.45 + 0.55 * sin(iTime * (2.5 + h * 5.0) + h * PI2);
    return smoothstep(0.22, 0.0, length(local)) * twinkle;
  }

  /* ── Main ── */
  void main() {
    vec2 fragCoord = vUv * iResolution.xy;
    vec2 center    = iResolution.xy * 0.5;
    float size     = min(iResolution.x, iResolution.y);

    /* UV raw (for star field — stationary) */
    vec2 uvRaw = (fragCoord - center) / size * 2.0;

    /* UV with rotation + hover warp */
    vec2 uv = uvRaw;
    float cs = cos(rot), ss = sin(rot);
    uv = vec2(cs * uv.x - ss * uv.y, ss * uv.x + cs * uv.y);
    uv.x += hover * hoverIntensity * 0.08 * sin(uv.y * 10.0 + iTime);
    uv.y += hover * hoverIntensity * 0.08 * sin(uv.x * 10.0 + iTime);

    float r = length(uv);
    float t = iTime;

    /* Palette */
    vec3 GOLD        = vec3(0.97, 0.76, 0.38);
    vec3 GOLD_BRIGHT = vec3(1.00, 0.93, 0.65);
    vec3 BLUE        = vec3(0.18, 0.62, 1.00);
    vec3 BLUE_BRIGHT = vec3(0.48, 0.82, 1.00);
    vec3 WHITE       = vec3(1.00, 1.00, 1.00);

    /* ── Deep navy base ── */
    vec3 col = vec3(0.025, 0.055, 0.13);

    /* ── Outer blue aura ── */
    col += BLUE * exp(-r * 2.6) * 0.38;
    col += BLUE_BRIGHT * exp(-r * 5.5) * 0.12;

    /* ── Star field (raw UV, stationary) ── */
    col += WHITE      * sparkle(uvRaw)               * 0.55;
    col += GOLD_BRIGHT * sparkle(uvRaw * 0.73 + 1.3) * 0.35;
    col += BLUE_BRIGHT * sparkle(uvRaw * 1.4  - 0.8) * 0.25;

    /* ── Flower of Life — inner golden mandala ── */
    float fol    = flowerOfLife(uv, t * 0.10);
    float folOut = outerSeed   (uv, t * 0.10);
    float folMask = smoothstep(0.32, 0.14, r);  /* fade outside inner zone */
    col += GOLD_BRIGHT * fol    * 0.80 * folMask;
    col += GOLD        * folOut * 0.45 * folMask;

    /* ── Concentric orbital rings (blue) ── */
    float rings = 0.0;
    rings += ring(r, 0.155, 0.0028) * 0.70;
    rings += ring(r, 0.225, 0.0026) * 0.62;
    rings += ring(r, 0.300, 0.0024) * 0.54;
    rings += ring(r, 0.378, 0.0022) * 0.46;
    rings += ring(r, 0.458, 0.0020) * 0.37;
    rings += ring(r, 0.540, 0.0018) * 0.28;
    rings += ring(r, 0.622, 0.0016) * 0.19;
    col += BLUE * rings;

    /* ── Orbital dots (3 rings, alternating spin) ── */
    col += BLUE_BRIGHT * orbitDot(uv, 0.300, 30.0, 0.009,  0.30);
    col += BLUE_BRIGHT * orbitDot(uv, 0.420, 46.0, 0.008, -0.22);
    col += GOLD_BRIGHT * orbitDot(uv, 0.540, 60.0, 0.007,  0.16) * 0.75;

    /* ── Sine waves ── */
    col += GOLD        * sineWave(uv, 0.135, 7.8, 0.0,       0.0058) * 0.92;
    col += BLUE        * sineWave(uv, 0.175, 6.8, PI,         0.0048) * 0.72;
    col += BLUE_BRIGHT * sineWave(uv, 0.085, 10.5, PI * 0.5,  0.0038) * 0.55;

    /* ── Gold particles on primary wave ── */
    float ga = 0.135, gf = 7.8;
    col += GOLD_BRIGHT * waveDot(uv, -0.82, ga, gf, 0.015);
    col += GOLD_BRIGHT * waveDot(uv, -0.57, ga, gf, 0.013);
    col += GOLD_BRIGHT * waveDot(uv, -0.30, ga, gf, 0.013);
    col += GOLD_BRIGHT * waveDot(uv,  0.00, ga, gf, 0.015);
    col += GOLD_BRIGHT * waveDot(uv,  0.30, ga, gf, 0.013);
    col += GOLD_BRIGHT * waveDot(uv,  0.57, ga, gf, 0.013);
    col += GOLD_BRIGHT * waveDot(uv,  0.82, ga, gf, 0.015);

    /* ── Golden core ── */
    col += GOLD        * exp(-r * 11.0) * 2.8;
    col += GOLD_BRIGHT * exp(-r * 26.0) * 3.5;
    col += WHITE       * exp(-r * 58.0) * 5.0;

    /* ── Tone map + gamma ── */
    col  = col / (col + vec3(0.68));
    col  = pow(clamp(col, 0.0, 1.0), vec3(0.86));

    float a = max(max(col.r, col.g), col.b);
    gl_FragColor = vec4(col * a, a);
  }
`;

/* ── OGL setup ─────────────────────────────────────────── */
const container = document.getElementById('orb-container');

const renderer = new Renderer({ alpha: true, premultipliedAlpha: false });
const gl       = renderer.gl;
gl.clearColor(0, 0, 0, 0);
container.appendChild(gl.canvas);

const geometry = new Triangle(gl);
const program  = new Program(gl, {
  vertex:   vert,
  fragment: frag,
  uniforms: {
    iTime:          { value: 0 },
    iResolution:    { value: new Vec3(gl.canvas.width, gl.canvas.height, 1) },
    hover:          { value: 0 },
    rot:            { value: 0 },
    hoverIntensity: { value: 0.2 },
  },
});

const mesh = new Mesh(gl, { geometry, program });

/* ── Resize ─────────────────────────────────────────────── */
function resize() {
  const dpr    = window.devicePixelRatio || 1;
  const w      = container.clientWidth;
  const h      = container.clientHeight;
  renderer.setSize(w * dpr, h * dpr);
  gl.canvas.style.width  = w + 'px';
  gl.canvas.style.height = h + 'px';
  program.uniforms.iResolution.value.set(gl.canvas.width, gl.canvas.height, 1);
}
window.addEventListener('resize', resize);
resize();

/* ── Hover ──────────────────────────────────────────────── */
let targetHover = 0;
container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height);
  const uvX  = ((e.clientX - rect.left  - rect.width  / 2) / size) * 2;
  const uvY  = ((e.clientY - rect.top   - rect.height / 2) / size) * 2;
  targetHover = Math.sqrt(uvX * uvX + uvY * uvY) < 0.9 ? 1 : 0;
});
container.addEventListener('mouseleave', () => { targetHover = 0; });

/* ── Render loop ────────────────────────────────────────── */
let lastTime   = 0;
let currentRot = 0;

(function loop(t) {
  requestAnimationFrame(loop);
  const dt = (t - lastTime) * 0.001;
  lastTime = t;

  program.uniforms.iTime.value = t * 0.001;
  program.uniforms.hover.value += (targetHover - program.uniforms.hover.value) * 0.1;

  if (program.uniforms.hover.value > 0.5) currentRot += dt * 0.3;
  program.uniforms.rot.value = currentRot;

  renderer.render({ scene: mesh });
})(0);
</script>
</body>
</html>
